<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify Certificate</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
}

/* Header */
.header {
    background: #3f51b5;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
}

/* Container */
.container {
    width: 90%;
    max-width: 700px;
    margin: 40px auto;
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    position: relative;
}

/* Title */
.card h2 {
    margin-bottom: 20px;
}

/* Rows */
.row {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}

/* Watermark */
.watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    color: rgba(0, 200, 100, 0.1);
}

/* Failed */
.error {
    background: #f8d7da;
    color: #721c24;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">Verify</div>

<div class="container">

    <div id="result" class="card" style="display:none;">
        <div class="watermark">✔</div>
        <h2>Certificate Details</h2>

        <div class="row"><b>CIN:</b> <span id="cin"></span></div>
        <div class="row"><b>Name:</b> <span id="name"></span></div>
        <div class="row"><b>Internship Track:</b> <span id="track"></span></div>
        <div class="row"><b>College:</b> <span id="college"></span></div>
        <div class="row"><b>LoR:</b> <span id="lor"></span></div>
        <div class="row"><b>Start Date:</b> <span id="start"></span></div>
        <div class="row"><b>End Date:</b> <span id="end"></span></div>
        <div class="row"><b>Issue Date:</b> <span id="issue"></span></div>
    </div>

    <div id="errorBox" class="error" style="display:none;">
        <b>Verification Failed!</b><br>
        Invalid or missing data.
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const cin = params.get("cin");
const name = params.get("name");
const track = params.get("track");
const college = params.get("college");
const lor = params.get("lor");
const start = params.get("start");
const end = params.get("end");
const issue = params.get("issue");

if (cin && name) {
    document.getElementById("result").style.display = "block";

    document.getElementById("cin").innerText = cin;
    document.getElementById("name").innerText = name;
    document.getElementById("track").innerText = track || "-";
    document.getElementById("college").innerText = college || "-";
    document.getElementById("lor").innerText = lor || "-";
    document.getElementById("start").innerText = start || "-";
    document.getElementById("end").innerText = end || "-";
    document.getElementById("issue").innerText = issue || "-";

} else {
    document.getElementById("errorBox").style.display = "block";
}
</script>

</body>
</html>
